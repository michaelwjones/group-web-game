<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blind Artists - Painting Tester</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #eee;
            display: flex;
            gap: 32px;
            padding: 32px;
            min-height: 100vh;
        }

        canvas {
            border: 1px solid #444;
            flex-shrink: 0;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; }

        .color-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .color-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-row label {
            width: 56px;
            font-size: 13px;
        }

        input[type="color"] {
            width: 36px;
            height: 28px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        button {
            padding: 10px 20px;
            background: #3a3a3a;
            color: #eee;
            border: 1px solid #555;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            align-self: flex-start;
        }

        button:hover { background: #4a4a4a; }

        .info {
            font-size: 12px;
            color: #888;
            line-height: 1.8;
            white-space: pre;
        }

        .info span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <div>
            <h2>Colors</h2>
            <br>
            <div class="color-grid">
                <div class="color-row"><label>Red</label><input type="color" id="color-red" value="#F42C04"></div>
                <div class="color-row"><label>Orange</label><input type="color" id="color-orange" value="#F29E4C"></div>
                <div class="color-row"><label>Yellow</label><input type="color" id="color-yellow" value="#EFEA5A"></div>
                <div class="color-row"><label>Green</label><input type="color" id="color-green" value="#1B9363"></div>
                <div class="color-row"><label>Blue</label><input type="color" id="color-blue" value="#0075A2"></div>
                <div class="color-row"><label>Purple</label><input type="color" id="color-purple" value="#A67DB8"></div>
            </div>
        </div>
        <button id="randomize">Randomize Painting</button>
        <div>
            <h2>Current Painting</h2>
            <br>
            <div id="info" class="info"></div>
        </div>
    </div>

    <script>
        const COLORS = ['red', 'orange', 'yellow', 'green', 'blue', 'purple'];
        const ZONES = ['back', 'mid', 'fore', 'focus'];
        const SLOTS = ['primary', 'secondary', 'shadow', 'highlight'];
        const ELEMENTS = {
            back:  ['aurora', 'sunset', 'storm'],
            mid:   ['mountains', 'forest', 'lake'],
            fore:  ['meadow', 'rockyshore', 'snowfield'],
            focus: ['tree', 'windmill', 'campfire']
        };
        const VALID_COLORS = {
            back: {
                aurora:     { primary: ['green','purple'],                    secondary: ['green','purple','blue','yellow'] },
                sunset:     { primary: ['orange','red'],                      secondary: ['orange','red','purple','yellow'] },
                storm:      { primary: ['purple','blue'],                     secondary: ['purple','blue','green','yellow'] },
            },
            mid: {
                mountains:  { primary: ['purple','blue'],                     secondary: ['purple','blue','orange','green'] },
                forest:     { primary: ['green','orange'],                    secondary: ['green','orange','yellow','red'] },
                lake:       { primary: ['blue','green'],                      secondary: ['blue','green','purple','yellow'] },
            },
            fore: {
                meadow:     { primary: ['green','yellow'],                    secondary: ['green','yellow','orange','purple'] },
                rockyshore: { primary: ['blue','orange'],                     secondary: ['blue','orange','purple','yellow'] },
                snowfield:  { primary: ['blue','purple'],                     secondary: ['blue','purple','yellow','green'] },
            },
            focus: {
                tree:       { primary: ['green','orange'],                    secondary: ['green','orange','red','yellow','purple'] },
                windmill:   { primary: ['orange','red'],                      secondary: ['orange','red','yellow','purple','blue'] },
                campfire:   { primary: ['orange','yellow'],                   secondary: ['orange','yellow','red'] },
            },
        };
        const ASSET_PATHS = ['blind-artists/', '../packages/client/static/blind-artists/'];

        function randomChoice(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getColor(name) {
            return document.getElementById(`color-${name}`).value;
        }

        function loadImage(filename) {
            return new Promise((resolve, reject) => {
                const paths = [...ASSET_PATHS];
                function tryNext() {
                    if (!paths.length) return reject(new Error(`Failed to load ${filename}`));
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = tryNext;
                    img.src = paths.shift() + filename;
                }
                tryNext();
            });
        }

        function tintImage(img, colorHex, w, h, blendMode = 'multiply') {
            const offscreen = new OffscreenCanvas(w, h);
            const ctx = offscreen.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            ctx.globalCompositeOperation = blendMode;
            ctx.fillStyle = colorHex;
            ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'destination-in';
            ctx.drawImage(img, 0, 0, w, h);
            return offscreen;
        }

        const ASPECT = 4267 / 5334; // width / height

        function sizeCanvas() {
            const canvas = document.getElementById('canvas');
            const padding = 32;
            const controlsWidth = 280;
            const availW = window.innerWidth - controlsWidth - padding * 3;
            const availH = window.innerHeight - padding * 2;
            let w, h;
            if (availW / availH < ASPECT) {
                w = availW;
                h = Math.round(w / ASPECT);
            } else {
                h = availH;
                w = Math.round(h * ASPECT);
            }
            canvas.width = w;
            canvas.height = h;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
        }

        let current = null;

        function pickRandom() {
            const chosen = {};
            for (const zone of ZONES) {
                const element = randomChoice(ELEMENTS[zone]);
                const valid = VALID_COLORS[zone][element];
                chosen[zone] = {
                    element,
                    slots: {
                        primary:   randomChoice(valid.primary),
                        secondary: randomChoice(valid.secondary),
                        highlight: randomChoice(COLORS),
                        shadow:    randomChoice(COLORS),
                    }
                };
            }
            return chosen;
        }

        async function render(chosen) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(0, 0, w, h);

            for (const zone of ZONES) {
                const { element, slots } = chosen[zone];
                for (const slot of SLOTS) {
                    try {
                        const img = await loadImage(`${zone}_${element}_${slot}.png`);
                        const tinted = tintImage(img, getColor(slots[slot]), w, h, slot === 'highlight' ? 'screen' : 'multiply');
                        ctx.drawImage(tinted, 0, 0);
                    } catch (e) {
                        console.warn(e.message);
                    }
                }
            }

            // Update info panel
            const infoEl = document.getElementById('info');
            infoEl.innerHTML = ZONES.map(zone => {
                const { element, slots } = chosen[zone];
                const slotStr = SLOTS.map(s => {
                    const hex = getColor(slots[s]);
                    return `  <span style="background:${hex}"></span>${s}: ${slots[s]}`;
                }).join('\n');
                return `<strong>${zone}</strong>: ${element}\n${slotStr}`;
            }).join('\n\n');
        }

        document.getElementById('randomize').addEventListener('click', () => {
            current = pickRandom();
            render(current);
        });

        // Re-render with same composition when a color changes
        COLORS.forEach(c => {
            document.getElementById(`color-${c}`).addEventListener('input', () => {
                if (current) render(current);
            });
        });

        // Initial render
        sizeCanvas();
        current = pickRandom();
        render(current);

        window.addEventListener('resize', () => {
            sizeCanvas();
            if (current) render(current);
        });
    </script>
</body>
</html>
